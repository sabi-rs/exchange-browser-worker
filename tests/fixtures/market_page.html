<html lang="en">

      <nav>

      <p>Not the target market.</p>

      <section class="market-summary">
        <h2>Popular picks</h2>

        <span data-label>Manchester <span>Uni</span>ted</span>

        <span data-label>Everton</span>
        <span data-buy>10%</span>
        <span data-sell>12%</span>
